version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: mealplanner-mongo-prod
    environment:
      MONGO_INITDB_DATABASE: mealplanner
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - mealplanner

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: prod
    container_name: mealplanner-server-prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.mealplanner-server.loadbalancer.server.port=5000"
      - "traefik.http.routers.mealplanner-server.rule=Host(`mealplannerserver.deathgotchi.site`)"
      - "traefik.http.routers.mealplanner-server.service=mealplanner-server"
      - "traefik.http.routers.mealplanner-server.entrypoints=websecure"
      - "traefik.http.routers.mealplanner-server.tls.certresolver=letsencrypt"
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/mealplanner
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://mealplanner.deathgotchi.site
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    depends_on:
      mongo:
        condition: service_healthy
    restart: always
    networks:
      - mealplanner

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: prod
      args:
        VITE_API_URL: https://mealplannerserver.deathgotchi.site
        VITE_WS_URL: wss://mealplannerserver.deathgotchi.site
    container_name: mealplanner-client-prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.mealplanner-client.loadbalancer.server.port=80"
      - "traefik.http.routers.mealplanner-client.rule=Host(`mealplanner.deathgotchi.site`)"
      - "traefik.http.routers.mealplanner-client.service=mealplanner-client"
      - "traefik.http.routers.mealplanner-client.entrypoints=websecure"
      - "traefik.http.routers.mealplanner-client.tls.certresolver=letsencrypt"
    ports:
      - "8081:80"
    depends_on:
      - server
    restart: always
    networks:
      - mealplanner

volumes:
  mongodb_data:

networks:
  mealplanner:
    driver: bridge
